name: Release

on:
  push:
    tags:
      - "v*"

# tauri-action creates a release and uploads assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: ""
          - os: windows-latest
            target: ""
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary at compile time by resolve_client_id().
          SPOTIFY_ARCHIVIST_CLIENT_ID: ${{ secrets.SPOTIFY_ARCHIVIST_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Spotify Archivist ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # tauri-action only uploads the installer bundles (nsis/msi). Also publish
      # the raw self-contained exe as a portable option. Windows only; the space
      # in the product name is stripped so the asset has a clean filename.
      - name: Upload portable exe
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          src="src-tauri/target/release/spotify-archivist.exe"
          dest="SpotifyArchivist-${{ github.ref_name }}-portable-x64.exe"
          cp "$src" "$dest"
          gh release upload "${{ github.ref_name }}" "$dest" --clobber
